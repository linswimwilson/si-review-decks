  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .container { padding: 14px 10px 40px; }

    .question-card { padding: 20px 16px; }
    .question-stem { font-size: 0.98rem; }
    .choice-card { padding: 12px 14px; }
    .choice-text { font-size: 0.9rem; }

</style>

  },
  {
    id: 4,
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A 19-year-old patient with Type 1 diabetes presents to the ED with blood glucose of 450 mg/dL, fruity-smelling breath, rapid deep respirations, and abdominal pain. ABG shows pH 7.22 and HCO\u2083\u207b 12 mEq/L. Which of the following BEST explains the Kussmaul respirations?",

    correct: [1],
    explanation: "<strong>Correct: The lungs are attempting to compensate for metabolic acidosis by blowing off CO\u2082.</strong><br><br>This is <strong>DKA (Diabetic Ketoacidosis)</strong>. Here\u2019s the cascade:<br>1. No insulin \u2192 cells can\u2019t use glucose \u2192 body burns <strong>fat</strong> for energy<br>2. Fat breakdown produces <strong>ketones</strong> (acidic molecules)<br>3. Ketones accumulate faster than the body can buffer them \u2192 <strong>metabolic acidosis</strong> (pH 7.22, HCO\u2083\u207b 12)<br>4. The lungs try to compensate by breathing rapidly and deeply (<strong>Kussmaul respirations</strong>) to blow off CO\u2082 \u2014 removing acid from the body<br>5. Acetone (a ketone) is exhaled \u2192 <strong>fruity breath</strong><br><br><strong>Why the others are wrong:</strong><br>A) This is not anxiety-driven hyperventilation \u2014 it\u2019s a physiological compensatory mechanism for acidosis. The pattern (deep AND rapid) is specific to metabolic compensation.<br>C) Ketones don\u2019t cause bronchospasm. The respiratory center responds to the <strong>low pH</strong>, not direct ketone irritation.<br>D) The renin-angiotensin system affects blood pressure and fluid balance, not respiratory rate."
  },
  {
    id: 5,
    type: "except",
    typeLabel: "All EXCEPT",
    stem: "All of the following are risk factors for developing Type 2 diabetes <strong>EXCEPT</strong>:",

    explanation: "<strong>Correct: Autoimmune destruction of pancreatic beta cells is NOT a risk factor for Type 2 \u2014 it is the CAUSE of Type 1.</strong><br><br>Type 2 diabetes is driven by <strong>insulin resistance</strong>, not autoimmune destruction. The beta cells are initially intact and producing insulin \u2014 the problem is that the cells won\u2019t respond to it. Over time, the overworked beta cells burn out and insulin production eventually declines.<br><br><strong>Why the others ARE Type 2 risk factors:</strong><br>A) <strong>Obesity</strong> \u2014 ~90% of Type 2 patients are obese. Excess adipose tissue releases free fatty acids that disrupt insulin receptors on liver, muscle, and fat cells.<br>C) <strong>Family history</strong> \u2014 strong genetic component. Having a first-degree relative with Type 2 significantly increases risk.<br>D) <strong>Physical inactivity</strong> \u2014 exercise increases insulin sensitivity and glucose uptake by muscles. Sedentary lifestyle removes this protective effect."

  {
    id: 6,
    type: "priority",
    typeLabel: "Priority / First Action",
    stem: "A nurse is caring for a diabetic patient who becomes shaky, diaphoretic, confused, and has a blood glucose of 54 mg/dL. The patient is conscious and able to swallow. What is the nurse\u2019s FIRST action?",

    correct: [1],
    explanation: "<strong>Correct: Give 15\u201320 grams of a fast-acting carbohydrate and recheck in 15 minutes.</strong><br><br>This is <strong>hypoglycemia</strong> \u2014 the most immediately life-threatening diabetes emergency. The brain needs constant glucose, and at 54 mg/dL this patient is already symptomatic (shaky, sweaty, confused).<br><br>The <strong>Rule of 15</strong>:<br>1. Give <strong>15\u201320g fast-acting carbs</strong> (4 oz juice, glucose tablets, regular soda)<br>2. <strong>Recheck glucose in 15 minutes</strong><br>3. Repeat if still below 70 mg/dL<br>4. Follow with a protein snack once stable<br><br>The patient is conscious and can swallow, so oral glucose is the fastest and safest intervention.<br><br><strong>Why the others are wrong:</strong><br>A) Giving insulin to a hypoglycemic patient would drop their glucose further \u2014 this could cause seizures, coma, or death. NEVER give insulin during hypoglycemia.<br>C) HbA1C is a 3-month average \u2014 completely useless in an acute emergency. Treat NOW.<br>D) Glucagon injection is for patients who are <strong>unconscious or cannot swallow</strong>. This patient can swallow \u2014 oral carbs are faster and more appropriate. IV access is not the first priority here."
  },
  {
    id: 7,
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A 62-year-old obese patient with Type 2 diabetes is found confused at home. Blood glucose is 820 mg/dL. Urinalysis shows <strong>no ketones</strong>. The patient is severely dehydrated with poor skin turgor. Which condition does this presentation represent, and what is the treatment PRIORITY?",
    choices: [

      "HHNK (Hyperglycemic Hyperosmolar Nonketotic Syndrome) \u2014 priority is aggressive IV fluid resuscitation",

      "DKA \u2014 priority is sodium bicarbonate to correct acidosis"
    ],
    correct: [1],
    explanation: "<strong>Correct: HHNK \u2014 priority is aggressive IV fluid resuscitation.</strong><br><br>This is <strong>HHNK</strong> (Hyperglycemic Hyperosmolar Nonketotic Syndrome), the acute emergency of Type 2 diabetes. The clues:<br>\u2022 <strong>Extremely high glucose (820)</strong> \u2014 often >600 mg/dL in HHNK<br>\u2022 <strong>No ketones</strong> \u2014 the patient has SOME insulin (enough to prevent fat breakdown/ketone production)<br>\u2022 <strong>Severe dehydration</strong> \u2014 the hallmark problem of HHNK<br>\u2022 <strong>Elderly, obese, Type 2</strong> \u2014 classic HHNK demographics<br>\u2022 <strong>Confusion</strong> \u2014 from hyperosmolarity and poor cerebral perfusion<br><br>Treatment priority is <strong>FLUIDS FIRST</strong>. The patient is critically dehydrated \u2014 the extremely high glucose has pulled massive amounts of water into the urine via osmotic diuresis. Rehydration improves perfusion, cardiac output, and renal function. Insulin and electrolyte correction come after fluid resuscitation begins.<br><br><strong>Key comparison:</strong> DKA = insulin first. HHNK = fluids first.<br><br><strong>Why the others are wrong:</strong><br>A) DKA has ketones and acidosis \u2014 this patient has NO ketones.<br>C) Glucose of 820 is dangerously HIGH, not low.<br>D) Sodium bicarbonate is rarely used even in DKA, and this isn\u2019t DKA."
  },
  {
    id: 8,
    type: "sata",
    typeLabel: "Select All That Apply",
    stem: "A nurse is educating a newly diagnosed diabetic patient about chronic complications of uncontrolled blood glucose. Which of the following are recognized chronic complications? <strong>Select all that apply.</strong>",
    choices: [

    correct: [0, 1, 2, 4, 5],
    explanation: "<strong>Correct: Retinopathy, nephropathy, peripheral neuropathy, coronary artery disease, and delayed wound healing/amputation risk.</strong><br><br>Chronic hyperglycemia (glucose >120 mg/dL) damages everything it touches over time:<br><br><strong>Microvascular (small vessel) damage:</strong><br>\u2022 <strong>Retinopathy</strong> \u2014 damage to retinal blood vessels; #1 cause of adult blindness<br>\u2022 <strong>Nephropathy</strong> \u2014 damage to kidney glomeruli; #1 cause of end-stage renal disease<br><br><strong>Macrovascular (large vessel) damage:</strong><br>\u2022 <strong>Coronary artery disease</strong> \u2014 accelerated atherosclerosis \u2192 MI risk<br>\u2022 <strong>Peripheral vascular disease</strong> \u2192 poor circulation to extremities<br><br><strong>Neuropathic damage:</strong><br>\u2022 <strong>Peripheral neuropathy</strong> \u2014 numbness in feet means patients can\u2019t feel injuries<br>\u2022 <strong>Delayed healing + neuropathy + poor circulation = AMPUTATION risk</strong><br><br><strong>Why D is wrong:</strong><br>Thyroid storm is an emergency of <strong>hyperthyroidism</strong> (Graves\u2019 disease), not a diabetes complication. These are completely different endocrine disorders."
  },
  {
    id: 9,
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A patient\u2019s HbA1C result comes back at 9.2%. Which of the following is the CORRECT interpretation?",
    choices: [
      "The patient\u2019s blood glucose has been well-controlled over the past 3 months",

    explanation: "<strong>Correct: The patient\u2019s blood glucose has been poorly controlled over the past 3 months.</strong><br><br><strong>HbA1C (glycosylated hemoglobin)</strong> measures the percentage of hemoglobin molecules that have glucose attached to them. Since red blood cells live ~120 days (3 months), the HbA1C reflects the <strong>average blood glucose over the past 2\u20133 months</strong> \u2014 much more informative than a single fingerstick.<br><br><strong>Key numbers to know:</strong><br>\u2022 <strong>Normal:</strong> below 5.7%<br>\u2022 <strong>Prediabetes:</strong> 5.7\u20136.4%<br>\u2022 <strong>Diabetes diagnosis:</strong> \u2265 6.5%<br>\u2022 <strong>Goal for diabetics:</strong> generally < 7%<br><br>At <strong>9.2%</strong>, this patient is significantly above target. This indicates chronic hyperglycemia and increased risk of complications. The care plan needs adjustment \u2014 medication changes, diet counseling, and/or exercise modifications.<br><br><strong>Why the others are wrong:</strong><br>A) 9.2% is far above the target of <7% \u2014 this is NOT well-controlled.<br>C) HbA1C reflects 3 months, not 24 hours. A single fingerstick glucose shows one moment; HbA1C shows the big picture.<br>D) 9.2% is not acceptable for any patient. The goal is to keep HbA1C as close to normal as safely possible."
  },

//  QUIZ ENGINE
// ============================================================
let currentQ = 0;
let score = 0;
let answered = 0;
let userAnswers = [];
let results = [];

const main = document.getElementById('mainContent');
const progressArea = document.getElementById('progressArea');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const scoreDisplay = document.getElementById('scoreDisplay');

function init() {
  userAnswers = questions.map(() => []);
  results = [];
  score = 0;
  answered = 0;
  currentQ = 0;
  showStart();
}

function showStart() {
  progressArea.classList.add('hidden');
  main.innerHTML = `
    <div class="start-screen">
      <h2>Diabetes Mellitus Pathophysiology</h2>
      <p>10-question diabetes mellitus quiz</p>
      <div class="start-details">
        <ul>
          <li>Insulin &amp; glucose &mdash; pancreatic function, feedback loops</li>
          <li>Type 1 vs. Type 2 &mdash; pathophysiology, onset, treatment</li>
          <li>Acute complications &mdash; hypoglycemia, DKA, HHNK</li>
          <li>Chronic complications &mdash; retinopathy, nephropathy, neuropathy, cardiovascular</li>
          <li>Diagnostic values &mdash; HbA1C, fasting glucose, random glucose</li>
          <li>Question types: Multiple Choice, Select All That Apply, True/False, All EXCEPT</li>
          <li>SATA questions are scored all-or-nothing</li>
          <li>Detailed explanations after every question</li>
        </ul>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Begin Quiz</button>
    </div>`;
}

function startQuiz() {
  progressArea.classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  progressBar.style.width = pct + '%';
  progressText.textContent = `Question ${currentQ + 1} of ${questions.length}`;
  scoreDisplay.textContent = answered > 0 ? `Score: ${score}/${answered}` : 'Score: 0/0';

  const isCheckbox = (q.type === 'sata');
  const indicatorClass = isCheckbox ? 'choice-indicator checkbox-indicator' : 'choice-indicator';

  let choicesHTML = q.choices.map((ch, i) => {
    const letter = String.fromCharCode(65 + i);
    return `
      <div class="choice-card" data-index="${i}" onclick="toggleChoice(${i}, ${isCheckbox})">
        <div class="${indicatorClass}">${letter}</div>
        <div class="choice-text">${ch}</div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-number">Question ${q.id} of ${questions.length}</span>
        <span class="question-type">${q.typeLabel}</span>
      </div>
      <div class="question-stem">${q.stem}</div>
      <div class="choices" id="choicesContainer">${choicesHTML}</div>
      <div class="button-row" id="buttonRow">
        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
      </div>
      <div id="explanationArea"></div>
    </div>`;
}

function toggleChoice(index, isCheckbox) {
  const cards = document.querySelectorAll('.choice-card');
  if (cards[0].classList.contains('disabled')) return;

  if (isCheckbox) {
    cards[index].classList.toggle('selected');
  } else {
    cards.forEach(c => c.classList.remove('selected'));
    cards[index].classList.add('selected');
  }

  const anySelected = document.querySelector('.choice-card.selected');
  document.getElementById('submitBtn').disabled = !anySelected;
}

function submitAnswer() {
  const q = questions[currentQ];
  const cards = document.querySelectorAll('.choice-card');
  const selected = [];
  cards.forEach((c, i) => { if (c.classList.contains('selected')) selected.push(i); });

  userAnswers[currentQ] = selected;

  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  let isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(v => selectedSet.has(v));

  results.push({ qIndex: currentQ, correct: isCorrect });
  answered++;
  if (isCorrect) score++;

  cards.forEach((c, i) => {
    c.classList.add('disabled');
    const wasSelected = selectedSet.has(i);
    const isRight = correctSet.has(i);

    if (wasSelected && isRight) {
      c.classList.remove('selected');
      c.classList.add('correct-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    } else if (wasSelected && !isRight) {
      c.classList.remove('selected');
      c.classList.add('incorrect-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10007;';
    } else if (!wasSelected && isRight) {
      c.classList.add('missed-correct');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    }
  });

  const expArea = document.getElementById('explanationArea');
  expArea.innerHTML = `
    <div class="explanation ${isCorrect ? '' : 'wrong'}">
      <div class="explanation-title ${isCorrect ? 'right' : 'wrong'}">
        ${isCorrect ? '&#10003; Correct!' : '&#10007; Incorrect'}
      </div>
      <div class="explanation-body">${q.explanation}</div>
    </div>`;

  scoreDisplay.textContent = `Score: ${score}/${answered}`;

  const btnRow = document.getElementById('buttonRow');
  if (currentQ < questions.length - 1) {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Next Question &rarr;</button>`;
  } else {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="showResults()">See Results &rarr;</button>`;
  }
}

function nextQuestion() {
  currentQ++;
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResults() {
  progressBar.style.width = '100%';
  progressText.textContent = 'Quiz Complete';
  scoreDisplay.textContent = `Final: ${score}/${questions.length}`;

  const pct = Math.round((score / questions.length) * 100);

  let message = '';
  if (pct >= 90) message = 'Outstanding work! You have a strong command of diabetes mellitus pathophysiology.';
  else if (pct >= 80) message = 'Great job! Review the missed questions to solidify your understanding.';
  else if (pct >= 70) message = 'Good effort! Focus on the topics where you missed questions.';
  else if (pct >= 60) message = 'You are building a foundation. Review the explanations carefully and try again.';
  else message = 'This material is challenging. Review the chapter content and explanations, then retake the quiz.';

  const missed = results.filter(r => !r.correct);

  let missedHTML = '';
  if (missed.length > 0) {
    missedHTML = `
      <div class="missed-list">
        <h3>Review Missed Questions (${missed.length})</h3>
        ${missed.map(m => {
          const q = questions[m.qIndex];
          const correctLetters = q.correct.map(c => String.fromCharCode(65 + c)).join(', ');
          const userLetters = userAnswers[m.qIndex].map(c => String.fromCharCode(65 + c)).join(', ') || 'None';
          return `
            <div class="missed-item">
              <div class="missed-item-q">Q${q.id}: ${q.stem.replace(/<[^>]*>/g, '')}</div>
              <div class="missed-item-detail">
                <strong>Your answer:</strong> ${userLetters}<br>
                <strong>Correct answer:</strong> ${correctLetters}<br><br>
                ${q.explanation}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  main.innerHTML = `
    <div class="results-screen">
      <div class="results-header">
        <div class="results-score">${score}/${questions.length}</div>
        <div class="results-percent">${pct}%</div>
        <div class="results-message">${message}</div>
      </div>
      <div class="button-row" style="justify-content:center; margin-bottom: 24px;">
        <button class="btn btn-primary" onclick="init()">Retake Quiz</button>
        ${missed.length > 0 ? `<button class="btn btn-secondary" onclick="document.querySelector('.missed-list').scrollIntoView({behavior:'smooth'})">Review Missed</button>` : ''}
      </div>
      ${missedHTML}
    </div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
