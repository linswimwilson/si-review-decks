    stem: "A 45-year-old female presents with fatigue, weight gain despite decreased appetite, constipation, cold intolerance, and dry skin. Lab results show <strong>elevated TSH</strong> and <strong>low T4</strong>. Which of the following BEST explains these lab findings?",

  {

  {
    id: 3,

    typeLabel: "True / False",

    correct: [1],

  {

    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A 32-year-old female presents with a 20-lb weight loss in 2 months despite increased appetite, heart rate of 112, hand tremors, anxiety, and bulging eyes. Which of the following BEST explains the pathophysiology of this condition?",
    choices: [

    correct: [1],
    explanation: "<strong>Correct: Autoimmune antibodies mimic TSH, continuously overstimulating the thyroid gland.</strong><br><br>This is <strong>Graves\u2019 disease</strong>, the most common cause of hyperthyroidism. The immune system produces <strong>thyroid-stimulating immunoglobulins (TSI)</strong> that bind to TSH receptors on the thyroid, mimicking TSH and telling the gland to GO GO GO. The result is a hypermetabolic state: weight loss, tachycardia, tremors, anxiety. <strong>Exophthalmos</strong> (bulging eyes) is the hallmark of Graves\u2019 specifically.<br><br><strong>Why the others are wrong:</strong><br>A) This describes Hashimoto\u2019s thyroiditis \u2014 autoimmune destruction, which causes HYPOthyroidism. Transient hyperthyroid symptoms can occur as stored hormone leaks, but this is not the chronic mechanism here.<br>C) Pituitary tumors causing hyperthyroidism are extremely rare. Also, exophthalmos is specific to Graves\u2019 autoantibodies, not pituitary tumors.<br>D) Iodine excess can transiently affect the thyroid, but does not cause exophthalmos or the full Graves\u2019 picture."

  {

  },
  {

    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A patient with severe, untreated hypothyroidism is found with marked hypotension, hypothermia (35.2\u00b0C / 95.4\u00b0F), respiratory depression, and decreasing level of consciousness. Which condition does this presentation represent?",

    explanation: "<strong>Correct: Myxedema coma.</strong><br><br>Myxedema is <strong>severe, life-threatening hypothyroidism</strong>. Everything about this patient is LOW and SLOW:<br>\u2022 <strong>Hypotension</strong> \u2014 cardiovascular depression<br>\u2022 <strong>Hypothermia</strong> \u2014 the body can\u2019t generate heat<br>\u2022 <strong>Respiratory depression</strong> \u2014 drive to breathe is depressed<br>\u2022 <strong>Decreased LOC \u2192 coma</strong> \u2014 brain function slows<br>\u2022 <strong>Cardiomegaly</strong> may also be present<br><br>This is a <strong>medical emergency</strong> requiring IV thyroid hormone replacement, warming measures, and hemodynamic support.<br><br><strong>Why the others are wrong:</strong><br>A) Thyroid storm is the OPPOSITE \u2014 everything is HIGH: fever, severe tachycardia, elevated BP, agitation. That\u2019s a hyperthyroid emergency.<br>C) Addisonian crisis involves hypotension and can look similar, but hypothermia with respiratory depression in the context of untreated hypothyroidism points to myxedema.<br>D) DKA involves hyperglycemia, Kussmaul respirations, and metabolic acidosis \u2014 a completely different picture."

  {

    stem: "A patient with known Graves\u2019 disease who recently had an upper respiratory infection suddenly develops a temperature of 40.2\u00b0C (104.4\u00b0F), heart rate of 158, blood pressure of 190/110, agitation, and confusion. What is the nurse\u2019s PRIORITY action?",

// ============================================================
//  QUIZ ENGINE
// ============================================================
let currentQ = 0;
let score = 0;
let answered = 0;
let userAnswers = [];
let results = [];

const main = document.getElementById('mainContent');
const progressArea = document.getElementById('progressArea');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const scoreDisplay = document.getElementById('scoreDisplay');

function init() {
  userAnswers = questions.map(() => []);
  results = [];
  score = 0;
  answered = 0;
  currentQ = 0;
  showStart();
}

// ---------- Start screen ----------
function showStart() {
  progressArea.classList.add('hidden');
  main.innerHTML = `
    <div class="start-screen">
      <h2>Thyroid Disorders Pathophysiology</h2>
      <p>10-question thyroid disorders quiz</p>
      <div class="start-details">
        <ul>
          <li>Thyroid axis &mdash; T3/T4, TSH, negative feedback</li>
          <li>Hypothyroidism &mdash; Hashimoto&rsquo;s, manifestations, myxedema</li>
          <li>Hyperthyroidism &mdash; Graves&rsquo;, manifestations, thyroid storm</li>
          <li>Goiter, exophthalmos, treatment strategies</li>
          <li>Question types: Multiple Choice, Select All That Apply, True/False, All EXCEPT, Priority</li>
          <li>SATA questions are scored all-or-nothing</li>
          <li>Detailed explanations after every question</li>
        </ul>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Begin Quiz</button>
    </div>`;
}

function startQuiz() {
  progressArea.classList.remove('hidden');
  showQuestion();
}

// ---------- Render question ----------
function showQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  progressBar.style.width = pct + '%';
  progressText.textContent = `Question ${currentQ + 1} of ${questions.length}`;
  scoreDisplay.textContent = answered > 0 ? `Score: ${score}/${answered}` : 'Score: 0/0';

  const isCheckbox = (q.type === 'sata');
  const indicatorClass = isCheckbox ? 'choice-indicator checkbox-indicator' : 'choice-indicator';

  let choicesHTML = q.choices.map((ch, i) => {
    const letter = String.fromCharCode(65 + i);
    return `
      <div class="choice-card" data-index="${i}" onclick="toggleChoice(${i}, ${isCheckbox})">
        <div class="${indicatorClass}">${letter}</div>
        <div class="choice-text">${ch}</div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-number">Question ${q.id} of ${questions.length}</span>
        <span class="question-type">${q.typeLabel}</span>
      </div>
      <div class="question-stem">${q.stem}</div>
      <div class="choices" id="choicesContainer">${choicesHTML}</div>
      <div class="button-row" id="buttonRow">
        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
      </div>
      <div id="explanationArea"></div>
    </div>`;
}

// ---------- Toggle choice ----------
function toggleChoice(index, isCheckbox) {
  const cards = document.querySelectorAll('.choice-card');
  if (cards[0].classList.contains('disabled')) return;

  if (isCheckbox) {
    cards[index].classList.toggle('selected');
  } else {
    cards.forEach(c => c.classList.remove('selected'));
    cards[index].classList.add('selected');
  }

  const anySelected = document.querySelector('.choice-card.selected');
  document.getElementById('submitBtn').disabled = !anySelected;
}

// ---------- Submit ----------
function submitAnswer() {
  const q = questions[currentQ];
  const cards = document.querySelectorAll('.choice-card');
  const selected = [];
  cards.forEach((c, i) => { if (c.classList.contains('selected')) selected.push(i); });

  userAnswers[currentQ] = selected;

  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  let isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(v => selectedSet.has(v));

  results.push({ qIndex: currentQ, correct: isCorrect });
  answered++;
  if (isCorrect) score++;

  cards.forEach((c, i) => {
    c.classList.add('disabled');
    const wasSelected = selectedSet.has(i);
    const isRight = correctSet.has(i);

    if (wasSelected && isRight) {
      c.classList.remove('selected');
      c.classList.add('correct-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    } else if (wasSelected && !isRight) {
      c.classList.remove('selected');
      c.classList.add('incorrect-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10007;';
    } else if (!wasSelected && isRight) {
      c.classList.add('missed-correct');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    }
  });

  const expArea = document.getElementById('explanationArea');
  expArea.innerHTML = `
    <div class="explanation ${isCorrect ? '' : 'wrong'}">
      <div class="explanation-title ${isCorrect ? 'right' : 'wrong'}">
        ${isCorrect ? '&#10003; Correct!' : '&#10007; Incorrect'}
      </div>
      <div class="explanation-body">${q.explanation}</div>
    </div>`;

  scoreDisplay.textContent = `Score: ${score}/${answered}`;

  const btnRow = document.getElementById('buttonRow');
  if (currentQ < questions.length - 1) {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Next Question &rarr;</button>`;
  } else {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="showResults()">See Results &rarr;</button>`;
  }
}

// ---------- Next ----------
function nextQuestion() {
  currentQ++;
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---------- Results ----------
function showResults() {
  progressBar.style.width = '100%';
  progressText.textContent = 'Quiz Complete';
  scoreDisplay.textContent = `Final: ${score}/${questions.length}`;

  const pct = Math.round((score / questions.length) * 100);

  let message = '';
  if (pct >= 90) message = 'Outstanding work! You have a strong command of thyroid disorder pathophysiology.';
  else if (pct >= 80) message = 'Great job! Review the missed questions to solidify your understanding.';
  else if (pct >= 70) message = 'Good effort! Focus on the topics where you missed questions.';
  else if (pct >= 60) message = 'You are building a foundation. Review the explanations carefully and try again.';
  else message = 'This material is challenging. Review the chapter content and explanations, then retake the quiz.';

  const missed = results.filter(r => !r.correct);

  let missedHTML = '';
  if (missed.length > 0) {
    missedHTML = `
      <div class="missed-list">
        <h3>Review Missed Questions (${missed.length})</h3>
        ${missed.map(m => {
          const q = questions[m.qIndex];
          const correctLetters = q.correct.map(c => String.fromCharCode(65 + c)).join(', ');
          const userLetters = userAnswers[m.qIndex].map(c => String.fromCharCode(65 + c)).join(', ') || 'None';
          return `
            <div class="missed-item">
              <div class="missed-item-q">Q${q.id}: ${q.stem.replace(/<[^>]*>/g, '')}</div>
              <div class="missed-item-detail">
                <strong>Your answer:</strong> ${userLetters}<br>
                <strong>Correct answer:</strong> ${correctLetters}<br><br>
                ${q.explanation}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  main.innerHTML = `
    <div class="results-screen">
      <div class="results-header">
        <div class="results-score">${score}/${questions.length}</div>
        <div class="results-percent">${pct}%</div>
        <div class="results-message">${message}</div>
      </div>
      <div class="button-row" style="justify-content:center; margin-bottom: 24px;">
        <button class="btn btn-primary" onclick="init()">Retake Quiz</button>
        ${missed.length > 0 ? `<button class="btn btn-secondary" onclick="document.querySelector('.missed-list').scrollIntoView({behavior:'smooth'})">Review Missed</button>` : ''}
      </div>
      ${missedHTML}
    </div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initialize
init();
</script>
