</style>

    stem: "A patient with chronic diarrhea for 2 weeks presents to the ED. Lab values show: pH 7.28, K+ 2.9 mEq/L, HCO3- 14 mEq/L. What acid-base disturbance is present, and what is the mechanism?",
    choices: [
      "Metabolic alkalosis from loss of potassium in stool",
      "Respiratory acidosis from hypoventilation due to weakness",
      "Metabolic acidosis from loss of bicarbonate in stool, with concurrent hypokalemia",

    ],
    correct: [2],
    explanation: "<strong>Correct: Metabolic acidosis from bicarbonate loss in stool, with hypokalemia.</strong><br><br>Diarrhea causes loss of <strong>bicarbonate-rich</strong> intestinal secretions. When you lose base (bicarbonate), the blood becomes more acidic \u2192 <strong>metabolic acidosis</strong>. The ABG confirms: pH 7.28 (acidotic), HCO3- 14 (low base = metabolic cause).<br><br>The <strong>hypokalemia (K+ 2.9)</strong> occurs because diarrheal fluid contains potassium. This is a critical clinical point: <strong>diarrhea-induced metabolic acidosis is the exception where acidosis pairs with LOW potassium.</strong> Normally, acidosis causes potassium to shift OUT of cells (hyperkalemia), but in diarrhea, the direct potassium loss in stool overwhelms this shift.<br><br>Compare with vomiting: Vomiting loses HCl (acid) \u2192 metabolic alkalosis with hypokalemia.<br><br><strong>Why the others are wrong:</strong><br>A) Diarrhea causes acidosis, NOT alkalosis. It's vomiting that causes alkalosis.<br>B) The pH and HCO3- indicate a metabolic, not respiratory, problem. PaCO2 would be the primary derangement in respiratory acidosis.<br>D) The pH is acidotic (7.28), not alkalotic."
  },
  {
    id: 2,
    section: "Lower GI",
    type: "tf",
    typeLabel: "True / False",
    stem: "Diarrhea causes metabolic alkalosis because of bicarbonate loss in stool.",
    choices: [
      "True",
      "False"
    ],
    correct: [1],
    explanation: "<strong>Correct: FALSE.</strong><br><br>This statement contains a critical contradiction. Diarrhea does cause bicarbonate loss in stool \u2014 that part is true. But losing bicarbonate (a base) causes metabolic <strong>ACIDOSIS</strong>, not alkalosis. If you lose base, you become acidotic.<br><br>The key relationships to memorize:<br><br><strong>VOMITING</strong> \u2192 loses HCl (acid) \u2192 metabolic <strong>ALKALOSIS</strong><br><strong>DIARRHEA</strong> \u2192 loses HCO3- (base) \u2192 metabolic <strong>ACIDOSIS</strong><br><br>Think of it this way:<br>\u2022 Losing acid = becoming more basic (alkalosis)<br>\u2022 Losing base = becoming more acidic (acidosis)<br><br>This is one of the most commonly tested acid-base concepts. The trick in this question is that it correctly identifies the MECHANISM (bicarb loss) but incorrectly names the RESULT (alkalosis instead of acidosis)."
  },
  {
    id: 3,
    section: "Lower GI",
    type: "sata",
    typeLabel: "Select All That Apply",
    stem: "The nurse is assessing a patient's stool characteristics. Which of the following findings suggest bleeding from the UPPER GI tract? <strong>Select all that apply.</strong>",
    choices: [
      "Melena (black, tarry, foul-smelling stool)",
      "Bright red blood per rectum in a hemodynamically unstable patient",
      "Maroon-colored stool",
      "Clay-colored (pale, acholic) stool",
      "Positive fecal occult blood test (FOBT)"
    ],
    correct: [0, 1, 2],
    explanation: "<strong>Correct: Melena, bright red blood with hemodynamic instability, and maroon-colored stool.</strong><br><br><strong>Melena</strong> is the classic sign of upper GI bleeding \u2014 blood is digested during transit through the intestines, turning it black and tarry with a distinctively foul smell.<br><br><strong>Bright red blood per rectum in a hemodynamically UNSTABLE patient</strong> can indicate a massive upper GI bleed \u2014 the bleeding is so brisk that blood transits the entire GI tract without being fully digested. Hemodynamic instability (hypotension, tachycardia) is the key clue that this isn't just hemorrhoidal bleeding.<br><br><strong>Maroon-colored stool</strong> often represents bleeding from the upper GI tract or small bowel where blood is partially digested.<br><br><strong>Why the others are wrong:</strong><br>D) <strong>Clay-colored stool</strong> indicates absence of bile pigment (bilirubin) reaching the stool \u2014 this is a sign of biliary obstruction or liver disease, NOT GI bleeding. No bile = pale stool.<br>E) <strong>Positive FOBT</strong> detects occult blood but cannot differentiate between upper and lower GI sources \u2014 the blood could be from anywhere in the GI tract. It is nonspecific for location."
  },
  {
    id: 4,
    section: "Lower GI",
    type: "except",
    typeLabel: "All EXCEPT",
    stem: "All of the following contribute to constipation <strong>EXCEPT</strong>:",
    choices: [

    correct: [1],
    explanation: "<strong>Correct: Regular physical activity PREVENTS constipation \u2014 it does not cause it.</strong><br><br>Physical activity stimulates peristalsis and promotes healthy bowel motility. It is one of the key non-pharmacological interventions recommended for constipation prevention.<br><br><strong>Why the others DO contribute to constipation:</strong><br>A) <strong>Opioids</strong> are notorious for causing constipation \u2014 they bind to mu receptors in the GI tract, slowing peristalsis, increasing water absorption, and increasing sphincter tone. Opioid-induced constipation is so common that bowel regimens are standard with opioid prescriptions.<br>C) <strong>Ignoring the urge to defecate</strong> leads to the rectum stretching and becoming less sensitive to distension over time. The stool sits longer, more water is absorbed, and it becomes harder and more difficult to pass.<br>D) <strong>Chronic laxative overuse</strong> causes the bowel to become dependent on laxatives for motility. The natural nerve reflexes weaken (\"lazy bowel\"), and the patient becomes unable to have a bowel movement without the laxative."
  },
  {
    id: 5,
    section: "Lower GI",
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A 68-year-old patient presents to the ED with left lower quadrant (LLQ) pain, fever of 38.8\u00b0C (101.8\u00b0F), and WBC of 14,200/\u00b5L. CT scan reveals inflammation and thickening around multiple sigmoid colon pouches with pericolonic fat stranding. What is the MOST likely diagnosis, and what is the nurse's key concern?",
    choices: [
      "Diverticulosis with mild symptoms; increase dietary fiber",
      "Acute diverticulitis with risk of perforation and abscess formation",
      "Sigmoid colon cancer causing partial obstruction",
      "Irritable bowel syndrome (IBS) flare requiring antispasmodics"
    ],
    correct: [1],
    explanation: "<strong>Correct: Acute diverticulitis with risk of perforation and abscess formation.</strong><br><br>This is a textbook presentation of <strong>acute diverticulitis</strong>:<br>\u2022 <strong>LLQ pain</strong> \u2014 diverticulitis most commonly affects the sigmoid colon (left side)<br>\u2022 <strong>Fever</strong> \u2014 indicates infection/inflammation<br>\u2022 <strong>Elevated WBC (14,200)</strong> \u2014 leukocytosis confirms infectious/inflammatory process<br>\u2022 <strong>CT findings</strong> \u2014 inflamed sigmoid pouches with fat stranding is diagnostic<br><br>The key concern is <strong>perforation</strong>. An inflamed diverticulum can rupture, leaking fecal material into the peritoneal cavity \u2192 peritonitis \u2192 sepsis. Other complications include abscess formation, fistula, and obstruction.<br><br><strong>Why the others are wrong:</strong><br>A) Diverticulosis is the presence of pouches WITHOUT inflammation \u2014 patients are typically asymptomatic. This patient has fever, elevated WBC, and CT-confirmed inflammation = diverticulITIS, not diverticulOSIS.<br>C) While colon cancer is a consideration in this age group, the CT specifically shows inflamed diverticular pouches, not a mass lesion.<br>D) IBS is a functional disorder \u2014 it does not cause fever, leukocytosis, or CT findings of inflammation."
  },
  {
    id: 6,
    section: "Lower GI",
    type: "priority",
    typeLabel: "Priority / First Action",
    stem: "A patient being treated for acute diverticulitis suddenly develops a rigid abdomen, temperature spike to 39.5\u00b0C (103.1\u00b0F), and reports severe diffuse abdominal pain (previously localized to the LLQ). What is the nurse's FIRST action?",
    choices: [
      "Administer the next scheduled dose of IV antibiotics",
      "Obtain a flat-plate abdominal X-ray to assess for free air",
      "Recognize perforation, make the patient NPO, and immediately notify the provider/activate rapid response",
      "Increase IV fluid rate and monitor vital signs every 15 minutes"
    ],
    correct: [2],
    explanation: "<strong>Correct: Recognize perforation, make NPO, and immediately notify the provider/activate rapid response.</strong><br><br>The clinical picture has changed dramatically \u2014 pain went from localized (LLQ) to <strong>diffuse</strong>, the abdomen is <strong>rigid (board-like)</strong>, and there is a <strong>temperature spike</strong>. This triad signals <strong>perforation with peritonitis</strong> \u2014 the inflamed diverticulum has ruptured, spilling intestinal contents into the peritoneal cavity.<br><br>This is a <strong>surgical emergency</strong>. The nurse must:<br>1. Recognize the emergency<br>2. Make the patient <strong>NPO immediately</strong> (nothing by mouth \u2014 prepare for OR)<br>3. <strong>Notify the provider/activate rapid response</strong> \u2014 this patient needs emergent surgical evaluation<br><br><strong>Why the others are wrong:</strong><br>A) The next scheduled antibiotic dose is too late \u2014 the clinical situation has fundamentally changed. The patient needs emergent surgical intervention, not continuation of the current treatment plan.<br>B) Imaging may be needed but obtaining it should not delay recognizing and communicating the emergency. The nurse's job is to recognize and escalate, not to confirm the diagnosis independently.<br>D) Increasing fluids and monitoring is supportive but not the FIRST action \u2014 the critical step is recognizing perforation and getting surgical help NOW."
  },
  {
    id: 7,
    section: "Lower GI",
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "Two patients are being discussed at a nursing conference. Patient A had an incidental finding of multiple outpouchings in the sigmoid colon during a routine colonoscopy \u2014 they are completely asymptomatic. Patient B presents with LLQ pain, fever, and elevated WBC with CT-confirmed sigmoid inflammation. Which statement BEST differentiates their conditions?",
    choices: [
      "Patient A has diverticulitis (inflamed pouches) and Patient B has diverticulosis (infected pouches)",

    ],
    correct: [1],
    explanation: "<strong>Correct: Patient A has diverticulosis (pouches present, no inflammation) and Patient B has diverticulitis (pouches with active inflammation/infection).</strong><br><br>This is a fundamental distinction:<br><br><strong>Diverticulosis</strong> = diverticula (outpouchings) EXIST in the colon wall, but there is NO inflammation or infection. Most people with diverticulosis are <strong>completely asymptomatic</strong> \u2014 it's often found incidentally during colonoscopy or imaging. It is extremely common in adults over 60 (affects up to 50-70% in Western countries). Management: high-fiber diet, hydration, exercise for prevention.<br><br><strong>Diverticulitis</strong> = one or more diverticula become <strong>inflamed and/or infected</strong>. This produces the classic triad: LLQ pain + fever + leukocytosis. Management: bowel rest, antibiotics, possibly surgery if complicated.<br><br>Think of it like this: Diverticul<strong>OSIS</strong> = the pouches just exist (\"osis\" = condition). Diverticul<strong>ITIS</strong> = the pouches are inflamed (\"itis\" = inflammation).<br><br><strong>Why the others are wrong:</strong><br>A) This reverses the definitions \u2014 Patient A (asymptomatic) cannot have diverticulitis.<br>C) An asymptomatic incidental finding is not diverticulitis at any stage.<br>D) Diverticula are not polyps \u2014 they are structurally and clinically different."
  },
  {
    id: 8,
    section: "Lower GI",
    type: "tf",
    typeLabel: "True / False",
    stem: "A colonoscopy should be performed during an acute episode of diverticulitis to confirm the diagnosis and visualize the inflamed diverticula.",
    choices: [
      "True",
      "False"

// ============================================================
//  QUIZ ENGINE
// ============================================================
let currentQ = 0;
let score = 0;
let answered = 0;
let userAnswers = []; // store user selections per question
let results = [];     // store {qIndex, correct: bool}

const main = document.getElementById('mainContent');
const progressArea = document.getElementById('progressArea');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const scoreDisplay = document.getElementById('scoreDisplay');

function init() {
  userAnswers = questions.map(() => []);
  results = [];
  score = 0;
  answered = 0;
  currentQ = 0;
  showStart();
}

// ---------- Start screen ----------
function showStart() {
  progressArea.classList.add('hidden');
  main.innerHTML = `
    <div class="start-screen">
      <h2>Lower GI &amp; Diverticular Disease</h2>
      <p>10-question focused quiz</p>
      <div class="start-details">
        <ul>
          <li>Diarrhea and constipation acid-base disturbances</li>
          <li>Stool assessment and GI bleeding indicators</li>
          <li>Diverticulosis vs. diverticulitis</li>
          <li>Question types: Multiple Choice, Select All That Apply, True/False, All EXCEPT, Priority</li>
          <li>SATA questions are scored all-or-nothing</li>
          <li>Detailed explanations after every question</li>
        </ul>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Begin Quiz</button>
    </div>`;
}

function startQuiz() {
  progressArea.classList.remove('hidden');
  showQuestion();
}

// ---------- Render question ----------
function showQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  progressBar.style.width = pct + '%';
  progressText.textContent = `Question ${currentQ + 1} of ${questions.length}`;
  scoreDisplay.textContent = answered > 0 ? `Score: ${score}/${answered}` : 'Score: 0/0';

  const isCheckbox = (q.type === 'sata');
  const indicatorClass = isCheckbox ? 'choice-indicator checkbox-indicator' : 'choice-indicator';

  let choicesHTML = q.choices.map((ch, i) => {
    const letter = String.fromCharCode(65 + i);
    return `
      <div class="choice-card" data-index="${i}" onclick="toggleChoice(${i}, ${isCheckbox})">
        <div class="${indicatorClass}">${letter}</div>
        <div class="choice-text">${ch}</div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-number">Question ${q.id} of ${questions.length}</span>
        <span class="question-type">${q.typeLabel}</span>
      </div>
      <div class="question-stem">${q.stem}</div>
      <div class="choices" id="choicesContainer">${choicesHTML}</div>
      <div class="button-row" id="buttonRow">
        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
      </div>
      <div id="explanationArea"></div>
    </div>`;
}

// ---------- Toggle choice ----------
function toggleChoice(index, isCheckbox) {
  const cards = document.querySelectorAll('.choice-card');
  if (cards[0].classList.contains('disabled')) return;

  if (isCheckbox) {
    cards[index].classList.toggle('selected');
  } else {
    cards.forEach(c => c.classList.remove('selected'));
    cards[index].classList.add('selected');
  }

  // Enable submit if at least one selected
  const anySelected = document.querySelector('.choice-card.selected');
  document.getElementById('submitBtn').disabled = !anySelected;
}

// ---------- Submit ----------
function submitAnswer() {
  const q = questions[currentQ];
  const cards = document.querySelectorAll('.choice-card');
  const selected = [];
  cards.forEach((c, i) => { if (c.classList.contains('selected')) selected.push(i); });

  userAnswers[currentQ] = selected;

  // Check correctness
  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  let isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(v => selectedSet.has(v));

  results.push({ qIndex: currentQ, correct: isCorrect });
  answered++;
  if (isCorrect) score++;

  // Highlight cards
  cards.forEach((c, i) => {
    c.classList.add('disabled');
    const wasSelected = selectedSet.has(i);
    const isRight = correctSet.has(i);

    if (wasSelected && isRight) {
      c.classList.remove('selected');
      c.classList.add('correct-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    } else if (wasSelected && !isRight) {
      c.classList.remove('selected');
      c.classList.add('incorrect-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10007;';
    } else if (!wasSelected && isRight) {
      c.classList.add('missed-correct');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    }
  });

  // Show explanation
  const expArea = document.getElementById('explanationArea');
  expArea.innerHTML = `
    <div class="explanation ${isCorrect ? '' : 'wrong'}">
      <div class="explanation-title ${isCorrect ? 'right' : 'wrong'}">
        ${isCorrect ? '&#10003; Correct!' : '&#10007; Incorrect'}
      </div>
      <div class="explanation-body">${q.explanation}</div>
    </div>`;

  // Update score display
  scoreDisplay.textContent = `Score: ${score}/${answered}`;

  // Replace submit with next
  const btnRow = document.getElementById('buttonRow');
  if (currentQ < questions.length - 1) {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Next Question &rarr;</button>`;
  } else {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="showResults()">See Results &rarr;</button>`;
  }
}

// ---------- Next ----------
function nextQuestion() {
  currentQ++;
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---------- Results ----------
function showResults() {
  progressBar.style.width = '100%';
  progressText.textContent = 'Quiz Complete';
  scoreDisplay.textContent = `Final: ${score}/${questions.length}`;

  const pct = Math.round((score / questions.length) * 100);

  // Message
  let message = '';
  if (pct >= 90) message = 'Outstanding work! You have a strong command of lower GI pathophysiology.';
  else if (pct >= 80) message = 'Great job! Review the missed questions to solidify your understanding.';
  else if (pct >= 70) message = 'Good effort! Focus on the areas where you missed questions.';
  else if (pct >= 60) message = 'You are building a foundation. Review the explanations carefully and try again.';
  else message = 'This material is challenging. Review the chapter content and explanations, then retake the quiz.';

  // Missed questions
  const missed = results.filter(r => !r.correct);

  let missedHTML = '';
  if (missed.length > 0) {
    missedHTML = `
      <div class="missed-list">
        <h3>Review Missed Questions (${missed.length})</h3>
        ${missed.map(m => {
          const q = questions[m.qIndex];
          const correctLetters = q.correct.map(c => String.fromCharCode(65 + c)).join(', ');
          const userLetters = userAnswers[m.qIndex].map(c => String.fromCharCode(65 + c)).join(', ') || 'None';
          return `
            <div class="missed-item">
              <div class="missed-item-q">Q${q.id}: ${q.stem.replace(/<[^>]*>/g, '')}</div>
              <div class="missed-item-detail">
                <strong>Your answer:</strong> ${userLetters}<br>
                <strong>Correct answer:</strong> ${correctLetters}<br><br>
                ${q.explanation}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  main.innerHTML = `
    <div class="results-screen">
      <div class="results-header">
        <div class="results-score">${score}/${questions.length}</div>
        <div class="results-percent">${pct}%</div>
        <div class="results-message">${message}</div>
      </div>
      <div class="button-row" style="justify-content:center; margin-bottom: 24px;">
        <button class="btn btn-primary" onclick="init()">Retake Quiz</button>
        ${missed.length > 0 ? `<button class="btn btn-secondary" onclick="document.querySelector('.missed-list').scrollIntoView({behavior:'smooth'})">Review Missed</button>` : ''}
      </div>
      ${missedHTML}
    </div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initialize
init();
</script>
