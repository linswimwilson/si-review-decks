    padding: 14px 16px;
    border: 2px solid var(--surface2);

  }
  .choice-card.correct-answer .choice-indicator {

  .missed-item-q {

    font-size: 0.92rem;

    color: #f1f5f9;

  .missed-item-detail {

    margin-bottom: 12px;
    color: #f1f5f9;

  .start-screen p {

  .start-details li::before {

  /* Hide/show */

  /* Responsive */

const questions = [
  {
    id: 1,
    section: "Hepatobiliary",
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A patient with pancreatic head cancer has developed complete biliary obstruction. The nurse is concerned about specific vitamin deficiencies related to fat malabsorption. Which fat-soluble vitamin deficiency places this patient at the HIGHEST immediate risk, and why?",
    choices: [
      "Vitamin A — risk of night blindness and impaired immune function",
      "Vitamin D — risk of hypocalcemia and osteoporosis",
      "Vitamin E — risk of peripheral neuropathy and hemolytic anemia",
      "Vitamin K — risk of life-threatening hemorrhage due to inability to synthesize clotting factors"
    ],
    correct: [3],
    explanation: "<strong>Correct: Vitamin K — risk of life-threatening hemorrhage.</strong><br><br>When bile flow is completely obstructed, bile salts cannot reach the duodenum. Without bile salts, the body cannot emulsify and absorb dietary fats — including the <strong>fat-soluble vitamins A, D, E, and K</strong>. All four will become deficient over time, but <strong>Vitamin K deficiency poses the most immediate danger</strong>.<br><br>Vitamin K is essential for the liver to produce clotting factors (II, VII, IX, and X). Without it, the patient <strong>cannot form clots</strong> and is at risk of spontaneous or uncontrollable bleeding — this can be fatal.<br><br><strong>Why the others are less immediately dangerous:</strong><br>A) Vitamin A deficiency causes vision problems and immune dysfunction, but these develop slowly and aren't immediately life-threatening.<br>B) Vitamin D deficiency leads to calcium and bone issues — serious but chronic, not acute.<br>C) Vitamin E deficiency causes neurological and red blood cell problems, but again, these develop gradually.<br><br>Remember <strong>ADEK</strong> — all are fat-soluble, all need bile for absorption, but <strong>K is the killer</strong> in acute obstruction."
  },
  {
    id: 2,
    section: "Hepatobiliary",
    type: "sata",
    typeLabel: "Select All That Apply",
    stem: "A nursing student is reviewing liver functions for an exam. Which of the following are functions of the liver? <strong>Select all that apply.</strong>",
    choices: [
      "Synthesis of albumin",
      "Production and secretion of bile",
      "Conversion of ammonia to urea",
      "Production of insulin",
      "Synthesis of clotting factors (e.g., fibrinogen, prothrombin)",
      "Metabolism and breakdown of hormones (including estrogen)"
    ],
    correct: [0, 1, 2, 4, 5],
    explanation: "<strong>Correct: Albumin synthesis, bile production, ammonia conversion, clotting factor synthesis, and hormone metabolism.</strong><br><br>The liver is the body's metabolic powerhouse:<br>• <strong>Albumin</strong> — the liver is the sole producer of albumin, which maintains oncotic pressure<br>• <strong>Bile</strong> — produced by hepatocytes, stored in the gallbladder, essential for fat digestion<br>• <strong>Ammonia → urea</strong> — the liver detoxifies ammonia (a byproduct of protein metabolism) by converting it to urea for renal excretion<br>• <strong>Clotting factors</strong> — the liver produces most clotting factors; liver failure = bleeding risk<br>• <strong>Hormone breakdown</strong> — the liver metabolizes and clears hormones including estrogen, aldosterone, and others<br><br><strong>Why D is wrong:</strong><br><strong>Insulin is produced by the beta cells of the pancreatic islets of Langerhans</strong> — this is an endocrine pancreas function, not a liver function. The liver does RESPOND to insulin (by storing glucose as glycogen), but it does not PRODUCE insulin. Don't confuse the liver's role in glucose metabolism with insulin production."
  },
  {
    id: 3,
    section: "Hepatobiliary",
    type: "all",
    typeLabel: "All of the Above",
    stem: "A 62-year-old patient with a history of alcohol use disorder is admitted with jaundice, abdominal distension with a positive fluid wave, and increasing confusion with difficulty following commands. Each of these findings represents a different mechanism of liver failure. Which statement is correct?",
    choices: [
      "Jaundice reflects the liver's failure to conjugate and excrete bilirubin",
      "Ascites reflects both decreased albumin production (low oncotic pressure) and portal hypertension",
      "Confusion (hepatic encephalopathy) reflects the liver's failure to convert ammonia to urea",
      "All of the above — each symptom maps to a distinct hepatic failure mechanism"
    ],
    correct: [3],
    explanation: "<strong>Correct: All of the above.</strong><br><br>This question illustrates the <strong>three collapses of cirrhosis</strong> — each symptom maps to a specific liver function that has failed:<br><br><strong>Jaundice = Bilirubin failure.</strong> The liver normally conjugates bilirubin (from red blood cell breakdown) and excretes it in bile. When the liver fails, unconjugated bilirubin accumulates in the blood, depositing in the skin and sclera → yellow discoloration.<br><br><strong>Ascites = Albumin/oncotic pressure failure + portal hypertension.</strong> The liver normally produces albumin, which holds fluid in the vasculature via oncotic pressure. When albumin drops, fluid leaks out. Simultaneously, scarred liver tissue increases resistance to portal blood flow (portal hypertension), pushing fluid into the peritoneal cavity.<br><br><strong>Confusion = Ammonia/detoxification failure.</strong> The liver normally converts toxic ammonia to urea. When this fails, ammonia accumulates and crosses the blood-brain barrier, causing hepatic encephalopathy — ranging from mild confusion to coma.<br><br>This triad (jaundice + ascites + encephalopathy) is the hallmark of decompensated cirrhosis."
  },
  {
    id: 4,
    section: "Hepatobiliary",
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A 28-year-old patient returns from a 3-week trip to a developing country where they ate local street food and drank untreated water. They now present with jaundice, fatigue, and RUQ tenderness. The patient denies IV drug use, sexual contact during the trip, and has no tattoos. Which hepatitis type and transmission route is MOST likely?",
    choices: [
      "Hepatitis B — transmitted via contaminated blood",
      "Hepatitis A — transmitted via the fecal-oral route from contaminated food/water",
      "Hepatitis C — transmitted via contaminated blood products",
      "Hepatitis D — transmitted via coinfection with another hepatitis virus"
    ],
    correct: [1],
    explanation: "<strong>Correct: Hepatitis A via the fecal-oral route.</strong><br><br>The clinical picture is classic: travel to a developing country + contaminated food/water exposure + no parenteral risk factors (no IV drugs, no blood exposure, no sexual contact) = <strong>Hepatitis A</strong>.<br><br>Hepatitis A is transmitted via the <strong>fecal-oral route</strong> — contaminated food, water, or close personal contact. It is common in areas with poor sanitation.<br><br>Memory trick: <strong>Vowels (A, E) = oral-fecal route. Consonants (B, C, D) = blood/body fluid route.</strong><br><br><strong>Why the others are wrong:</strong><br>A) Hepatitis B is transmitted via blood and body fluids (sexual contact, needles, perinatal). The patient denies these risk factors.<br>C) Hepatitis C is primarily blood-borne (contaminated needles, blood transfusions). No risk factors here.<br>D) Hepatitis D only occurs as a coinfection with Hepatitis B — the patient would need to have Hep B first. Also blood-borne."
  },
  {
    id: 5,
    section: "Hepatobiliary",
    type: "except",
    typeLabel: "All EXCEPT",
    stem: "All of the following hepatitis types can progress to chronic infection <strong>EXCEPT</strong>:",
    choices: [
      "Hepatitis A",
      "Hepatitis B",
      "Hepatitis C",
      "Hepatitis D"
    ],
    correct: [0],
    explanation: "<strong>Correct: Hepatitis A CANNOT become chronic.</strong><br><br><strong>Hepatitis A</strong> is ALWAYS acute and self-limiting. It does not have a chronic carrier state. Patients get sick, recover (usually within weeks to months), and develop lifelong immunity. There is no chronic Hep A.<br><br><strong>The others CAN become chronic:</strong><br>B) <strong>Hepatitis B</strong> — can become chronic, especially if acquired in infancy/childhood (90% become chronic if infected at birth). Chronic Hep B increases risk of cirrhosis and hepatocellular carcinoma.<br>C) <strong>Hepatitis C</strong> — the MOST likely to become chronic. Up to 75-85% of acute infections become chronic. It is the leading cause of liver transplant in the US (though new antivirals are changing this).<br>D) <strong>Hepatitis D</strong> — can become chronic when it occurs as a superinfection on top of chronic Hep B.<br><br>Think of it this way: Hep A is the \"traveler's hepatitis\" — you get it, you fight it off, you're done. The consonant hepatitis types (B, C, D) are the ones that can stick around."
  },
  {
    id: 6,
    section: "Hepatobiliary",
    type: "tf",
    typeLabel: "True / False",
    stem: "Hepatitis B is transmitted via the oral-fecal route, similar to Hepatitis A.",
    choices: [
      "True",
      "False"
    ],
    correct: [1],
    explanation: "<strong>Correct: FALSE.</strong><br><br>Hepatitis B is transmitted via <strong>blood and body fluids</strong> — NOT the oral-fecal route. Routes include:<br>• Sexual contact (it is an STI)<br>• Contaminated needles (IV drug use, needlestick injuries)<br>• Perinatal (mother to infant during birth)<br>• Blood transfusion (rare now due to screening)<br><br>It is <strong>Hepatitis A and E</strong> that use the oral-fecal route.<br><br>Memory device: <strong>Vowels (A, E) = oral-fecal. Consonants (B, C, D) = blood and body fluids.</strong><br><br>This distinction matters clinically because the precautions and prevention strategies are completely different. Hep A prevention = hand hygiene, safe food/water, vaccination. Hep B prevention = safe sex practices, needle safety, standard precautions, vaccination."
  },
  {
    id: 7,
    section: "Hepatobiliary",
    type: "mc",
    typeLabel: "Multiple Choice",
    stem: "A cirrhosis patient is admitted with increasing confusion over the past 2 days. On examination, the nurse notes asterixis (\"liver flap\") when the patient extends their wrists. What substance is accumulating to cause these neurological symptoms, and what is the FIRST-LINE treatment?",
    choices: [
      "Bilirubin accumulation; treat with phototherapy",
      "Ammonia accumulation; treat with lactulose",
      "Urea accumulation; treat with hemodialysis",
      "Lactate accumulation; treat with sodium bicarbonate"
    ],
    correct: [1],
    explanation: "<strong>Correct: Ammonia accumulation treated with lactulose.</strong><br><br>This is <strong>hepatic encephalopathy</strong>. The cirrhotic liver cannot convert <strong>ammonia</strong> (a toxic byproduct of protein metabolism) into <strong>urea</strong> (which would normally be excreted by the kidneys). Ammonia accumulates in the blood, crosses the blood-brain barrier, and causes neurological dysfunction ranging from subtle personality changes to asterixis to coma.<br><br><strong>Asterixis</strong> (\"liver flap\") is the classic physical finding — a flapping tremor when the patient extends their wrists. It indicates significant ammonia levels.<br><br><strong>Lactulose</strong> is first-line treatment because it:<br>1. Acts as an osmotic laxative, increasing stool frequency<br>2. Acidifies the colon, converting ammonia (NH3) to ammonium (NH4+), which cannot be reabsorbed<br>3. Goal: 2-3 soft stools per day to keep ammonia moving OUT of the body<br><br><strong>Why the others are wrong:</strong><br>A) Bilirubin causes jaundice, not encephalopathy. Phototherapy is for neonatal jaundice.<br>C) It's ammonia that accumulates because it CAN'T be converted to urea. The liver failure IS the problem.<br>D) Lactate causes lactic acidosis, not encephalopathy with asterixis."
  },
  {
    id: 8,
    section: "Hepatobiliary",
    type: "priority",
    typeLabel: "Priority / First Action",
    stem: "A patient with known cirrhosis and esophageal varices begins vomiting large amounts of bright red blood. Blood pressure is 82/50 mmHg and heart rate is 128 bpm. What is the nurse's FIRST priority?",
    choices: [
      "Insert a nasogastric tube to quantify blood loss",
      "Activate rapid response and begin hemodynamic stabilization (large-bore IV access, fluid resuscitation)",
      "Administer a proton pump inhibitor IV push",
      "Prepare the patient for an endoscopy"
    ],
    correct: [1],
    explanation: "<strong>Correct: Activate rapid response and begin hemodynamic stabilization.</strong><br><br>Ruptured <strong>esophageal varices</strong> are a <strong>life-threatening emergency</strong>. These are massively dilated veins caused by portal hypertension that can rupture and bleed profusely. The patient's vitals show <strong>hemorrhagic shock</strong> — hypotension (82/50) and tachycardia (128) — meaning significant blood loss is already occurring.<br><br>The FIRST priority is always <strong>ABCs and hemodynamic stabilization</strong>:<br>• Activate rapid response / call the provider STAT<br>• Establish large-bore IV access (at least two 16-18 gauge IVs)<br>• Begin aggressive fluid resuscitation<br>• Type and crossmatch for blood products<br>• Prepare for possible balloon tamponade or emergent endoscopy<br><br><strong>Why the others are wrong:</strong><br>A) Inserting an NG tube in a patient with known varices and active hematemesis is DANGEROUS and could worsen bleeding.<br>C) A PPI won't stop variceal bleeding — these are venous bleeds from portal hypertension, not acid-related erosions.<br>D) Endoscopy will likely be needed for banding/sclerotherapy, but the patient must be stabilized FIRST — you can't scope a crashing patient."
  },
  {
    id: 9,
    section: "Hepatobiliary",
    type: "sata",
    typeLabel: "Select All That Apply",
    stem: "A patient is newly diagnosed with portal hypertension secondary to cirrhosis. Which of the following findings would the nurse expect? <strong>Select all that apply.</strong>",

// ============================================================
//  QUIZ ENGINE
// ============================================================
let currentQ = 0;
let score = 0;
let answered = 0;
let userAnswers = []; // store user selections per question
let results = [];     // store {qIndex, correct: bool}

const main = document.getElementById('mainContent');
const progressArea = document.getElementById('progressArea');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const scoreDisplay = document.getElementById('scoreDisplay');

function init() {
  userAnswers = questions.map(() => []);
  results = [];
  score = 0;
  answered = 0;
  currentQ = 0;
  showStart();
}

// ---------- Start screen ----------
function showStart() {
  progressArea.classList.add('hidden');
  main.innerHTML = `
    <div class="start-screen">
      <h2>Liver, Hepatitis &amp; Cirrhosis</h2>
      <p>10-question focused quiz</p>
      <div class="start-details">
        <ul>
          <li>Liver functions: bile production, albumin, clotting factors, detoxification</li>
          <li>Fat-soluble vitamins (ADEK) and bile dependency</li>
          <li>Hepatitis types and transmission (vowels vs. consonants)</li>
          <li>Cirrhosis: the three collapses (jaundice, ascites, encephalopathy)</li>
          <li>Portal hypertension and its consequences</li>
          <li>Question types: Multiple Choice, Select All That Apply, True/False, All EXCEPT, Priority</li>
          <li>SATA questions are scored all-or-nothing</li>
          <li>Detailed explanations after every question</li>
        </ul>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Begin Quiz</button>
    </div>`;
}

function startQuiz() {
  progressArea.classList.remove('hidden');
  showQuestion();
}

// ---------- Render question ----------
function showQuestion() {
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  progressBar.style.width = pct + '%';
  progressText.textContent = `Question ${currentQ + 1} of ${questions.length}`;
  scoreDisplay.textContent = answered > 0 ? `Score: ${score}/${answered}` : 'Score: 0/0';

  const isCheckbox = (q.type === 'sata');
  const indicatorClass = isCheckbox ? 'choice-indicator checkbox-indicator' : 'choice-indicator';

  let choicesHTML = q.choices.map((ch, i) => {
    const letter = String.fromCharCode(65 + i);
    return `
      <div class="choice-card" data-index="${i}" onclick="toggleChoice(${i}, ${isCheckbox})">
        <div class="${indicatorClass}">${letter}</div>
        <div class="choice-text">${ch}</div>
      </div>`;
  }).join('');

  main.innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-number">Question ${q.id} of ${questions.length}</span>
        <span class="question-type">${q.typeLabel}</span>
      </div>
      <div class="question-stem">${q.stem}</div>
      <div class="choices" id="choicesContainer">${choicesHTML}</div>
      <div class="button-row" id="buttonRow">
        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
      </div>
      <div id="explanationArea"></div>
    </div>`;
}

// ---------- Toggle choice ----------
function toggleChoice(index, isCheckbox) {
  const cards = document.querySelectorAll('.choice-card');
  if (cards[0].classList.contains('disabled')) return;

  if (isCheckbox) {
    cards[index].classList.toggle('selected');
  } else {
    cards.forEach(c => c.classList.remove('selected'));
    cards[index].classList.add('selected');
  }

  // Enable submit if at least one selected
  const anySelected = document.querySelector('.choice-card.selected');
  document.getElementById('submitBtn').disabled = !anySelected;
}

// ---------- Submit ----------
function submitAnswer() {
  const q = questions[currentQ];
  const cards = document.querySelectorAll('.choice-card');
  const selected = [];
  cards.forEach((c, i) => { if (c.classList.contains('selected')) selected.push(i); });

  userAnswers[currentQ] = selected;

  // Check correctness
  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  let isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(v => selectedSet.has(v));

  results.push({ qIndex: currentQ, correct: isCorrect });
  answered++;
  if (isCorrect) score++;

  // Highlight cards
  cards.forEach((c, i) => {
    c.classList.add('disabled');
    const wasSelected = selectedSet.has(i);
    const isRight = correctSet.has(i);

    if (wasSelected && isRight) {
      c.classList.remove('selected');
      c.classList.add('correct-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    } else if (wasSelected && !isRight) {
      c.classList.remove('selected');
      c.classList.add('incorrect-answer');
      c.querySelector('.choice-indicator').innerHTML = '&#10007;';
    } else if (!wasSelected && isRight) {
      c.classList.add('missed-correct');
      c.querySelector('.choice-indicator').innerHTML = '&#10003;';
    }
  });

  // Show explanation
  const expArea = document.getElementById('explanationArea');
  expArea.innerHTML = `
    <div class="explanation ${isCorrect ? '' : 'wrong'}">
      <div class="explanation-title ${isCorrect ? 'right' : 'wrong'}">
        ${isCorrect ? '&#10003; Correct!' : '&#10007; Incorrect'}
      </div>
      <div class="explanation-body">${q.explanation}</div>
    </div>`;

  // Update score display
  scoreDisplay.textContent = `Score: ${score}/${answered}`;

  // Replace submit with next
  const btnRow = document.getElementById('buttonRow');
  if (currentQ < questions.length - 1) {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Next Question &rarr;</button>`;
  } else {
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="showResults()">See Results &rarr;</button>`;
  }
}

// ---------- Next ----------
function nextQuestion() {
  currentQ++;
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---------- Results ----------
function showResults() {
  progressBar.style.width = '100%';
  progressText.textContent = 'Quiz Complete';
  scoreDisplay.textContent = `Final: ${score}/${questions.length}`;

  const pct = Math.round((score / questions.length) * 100);

  // Message
  let message = '';
  if (pct >= 90) message = 'Outstanding work! You have a strong command of hepatobiliary pathophysiology.';
  else if (pct >= 80) message = 'Great job! Review the missed questions to solidify your understanding.';
  else if (pct >= 70) message = 'Good effort! Focus on the areas where you missed questions.';
  else if (pct >= 60) message = 'You are building a foundation. Review the explanations carefully and try again.';
  else message = 'This material is challenging. Review the liver/hepatitis/cirrhosis content and explanations, then retake the quiz.';

  // Missed questions
  const missed = results.filter(r => !r.correct);

  let missedHTML = '';
  if (missed.length > 0) {
    missedHTML = `
      <div class="missed-list">
        <h3>Review Missed Questions (${missed.length})</h3>
        ${missed.map(m => {
          const q = questions[m.qIndex];
          const correctLetters = q.correct.map(c => String.fromCharCode(65 + c)).join(', ');
          const userLetters = userAnswers[m.qIndex].map(c => String.fromCharCode(65 + c)).join(', ') || 'None';
          return `
            <div class="missed-item">
              <div class="missed-item-q">Q${q.id}: ${q.stem.replace(/<[^>]*>/g, '')}</div>
              <div class="missed-item-detail">
                <strong>Your answer:</strong> ${userLetters}<br>
                <strong>Correct answer:</strong> ${correctLetters}<br><br>
                ${q.explanation}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  main.innerHTML = `
    <div class="results-screen">
      <div class="results-header">
        <div class="results-score">${score}/${questions.length}</div>
        <div class="results-percent">${pct}%</div>
        <div class="results-message">${message}</div>
      </div>
      <div class="button-row" style="justify-content:center; margin-bottom: 24px;">
        <button class="btn btn-primary" onclick="init()">Retake Quiz</button>
        ${missed.length > 0 ? `<button class="btn btn-secondary" onclick="document.querySelector('.missed-list').scrollIntoView({behavior:'smooth'})">Review Missed</button>` : ''}
      </div>
      ${missedHTML}
    </div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initialize
init();
</script>
